<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ProstaCare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
        }
        .auth-card h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.5);
            font-family: inherit;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        @media (prefers-color-scheme: dark) {
            .form-control {
                background: rgba(0, 0, 0, 0.2);
            }
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(43, 108, 176, 0.2);
        }
        .auth-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
        }
        .auth-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 0.8rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .alert-error {
            background-color: rgba(254, 226, 226, 0.8);
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="container header-container">
            <a href="index.html" class="logo">ProstaCare</a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="signup.html" class="btn btn-outline">Sign Up</a>
            </nav>
        </div>
    </header>

    <main class="auth-container fade-in">
        <div class="glass-card auth-card">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
            </form>
            <div id="auth-error" class="alert alert-error"></div>
            <div class="auth-links">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
                <p style="margin-top: 0.8rem;"><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelector('.fade-in').classList.add('visible');
        });
    </script>
</body>
</html>
